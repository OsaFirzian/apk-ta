<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistem Pakar Diagnosa</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="login-container">

        <h2 class="login-title">Sistem Pakar Diagnosa<br>Gangguan Internet</h2>

        {% if error %}
            <div style="color: #d9534f; background-color: #f9f2f2; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-size: 14px;">
                {{ error }}
            </div>
        {% endif %}

        <form action="#" method="POST">
            
            <div class="input-group">
                <svg class="input-icon" viewBox="0 0 24 24">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
                <input type="text" name="username" placeholder="Username" required>
            </div>

            <div class="input-group">
                <svg class="input-icon" viewBox="0 0 24 24">
                    <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/>
                </svg>
                <input type="password" name="password" placeholder="Password" required>
            </div>

            <a href="#" class="forgot-password">Forgot password?</a>

            <button type="submit" class="login-btn">Log In</button>
        </form>

        <div class="login-footer">
            &copy; 2026 NOC Support - PT. Remala Abadi
        </div>
    </div>

</body>
</html>
